<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園主題系統介面</title>
    <style>
        /* 基礎設定，確保畫面填滿且無邊距 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* 防止捲動軸出現 */
        }

        /* 向量底圖容器：固定在最底層 */
        .svg-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* 背景 SVG 確保能適應各種螢幕尺寸 */
        .svg-background svg {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖形保持比例並填滿畫面 */
        }

        /* 讓 SVG 內群組在自適應縮放時具有平滑的過渡動畫 (Premium 級視覺體驗) */
        #castle-building, #running-track, #animated-clouds {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 內容容器：使用現代化的 Flexbox 將內容置中 */
        .content-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* 雲朵飄移動畫：純水平由左至右，徹底杜絕任何上下位移 */
        @keyframes drift {
            0% { transform: translateX(-350px); }
            100% { transform: translateX(1150px); }
        }
        
        /* 雲朵淡入縮放動畫：嚴格依據遠近層次設定最高透明度 */
        /* 近景層：最接近不透明白色 (Opacity 0.95) */
        @keyframes fadeNear {
            0% { opacity: 0; transform: scale(0.65); }
            15% { opacity: 0.95; transform: scale(1); }
            85% { opacity: 0.95; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.65); }
        }
        /* 中景層：中等透明度 (Opacity 0.65) */
        @keyframes fadeMid {
            0% { opacity: 0; transform: scale(0.65); }
            15% { opacity: 0.65; transform: scale(1); }
            85% { opacity: 0.65; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.65); }
        }
        /* 遠景層：最高透明度，刷淡效果 (Opacity 0.3) */
        @keyframes fadeFar {
            0% { opacity: 0; transform: scale(0.65); }
            15% { opacity: 0.3; transform: scale(1); }
            85% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.65); }
        }

        /* 關鍵修正：強制每一朵雲以「自己的中心點」為基準進行縮放，避免因畫布座標導致的上下位移錯覺 */
        .cloud-fade-n1, .cloud-fade-n2, .cloud-fade-m1, .cloud-fade-m2, .cloud-fade-f1, .cloud-fade-f2 {
            transform-box: fill-box;
            transform-origin: center;
        }

        /* 近景雲層 (位置最高，幾乎不透明，速度最快) */
        .cloud-drift-n1 { animation: drift 45s linear infinite -5s; }
        .cloud-fade-n1 { animation: fadeNear 45s ease-in-out infinite -5s; }
        .cloud-drift-n2 { animation: drift 55s linear infinite -25s; }
        .cloud-fade-n2 { animation: fadeNear 55s ease-in-out infinite -25s; }

        /* 中景雲層 (透明度中等，速度中等) */
        .cloud-drift-m1 { animation: drift 80s linear infinite -15s; }
        .cloud-fade-m1 { animation: fadeMid 80s ease-in-out infinite -15s; }
        .cloud-drift-m2 { animation: drift 90s linear infinite -50s; }
        .cloud-fade-m2 { animation: fadeMid 90s ease-in-out infinite -50s; }

        /* 遠景雲層 (靠近地平線或建築後方，最透明，速度極慢) */
        .cloud-drift-f1 { animation: drift 130s linear infinite -30s; }
        .cloud-fade-f1 { animation: fadeFar 130s ease-in-out infinite -30s; }
        .cloud-drift-f2 { animation: drift 150s linear infinite -80s; }
        .cloud-fade-f2 { animation: fadeFar 150s ease-in-out infinite -80s; }
    </style>
</head>
<body>

    <!-- 純前端刻劃的 SVG 校園底圖 -->

            <!-- 建築物群 -->

                <!-- 4. 右側粉紅高塔與屋頂 -->

                    <rect x="100" y="290" width="310" height="25" fill="#F5AC45" />

    <!-- 螢幕自適應：智慧場景調整腳本 -->
    <script>
        function autoAdjustScene() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const ratio = width / height;
            
            const svgW = 800;
            const svgH = 1000;
            // 計算 preserveAspectRatio="xMidYMid slice" 產生的實際可見區域與縮放比例
            const scale = Math.max(width / svgW, height / svgH);
            const vW = width / scale;
            const vH = height / scale;
            const vX = (svgW - vW) / 2;
            const vY = (svgH - vH) / 2;

            // ==========================================
            // 1. 城堡高度限制：精準對齊畫面上緣 10 像素
            // ==========================================
            const castle = document.getElementById('castle-building');
            let cScale = 0.9;
            let cTx = 24; 
            
            if (ratio < 0.8) {
                cScale = 0.85;
                cTx = 100; // 手機版將城堡向右推
            } else if (ratio > 1.6) {
                cScale = 0.8;
                cTx = 40;
            }
            
            // 經過 SVG 變換矩陣回推計算，左側高塔黃圓頂最高點的原始 Y 座標為 114.3
            const peakOffsetY = 114.3; 
            
            // 將城堡精準上移至距離可見頂端 (vY) 向下 10 個螢幕像素 (10/scale) 的位置
            let cTy = vY + (10 / scale) - (peakOffsetY * cScale);
            
            castle.setAttribute('transform', `translate(${cTx}, ${cTy}) scale(${cScale})`);

            // ==========================================
            // 2. 跑道透視邏輯：精準計算實體邊緣交會點
            // ==========================================
            const track = document.getElementById('running-track');
            // 跑道外框橢圓參數 (最外緣紅色實體邊界 rx=798)
            const cx = 850, cy = 850, rx = 798, ry = 291;
            const grassTop = 450;
            const grassVisibleHeight = (vY + vH) - grassTop;
            
            // 跑道的上緣距離草地上緣，不得小於草地可見高度的 1/3
            let minTy = (grassVisibleHeight / 3) + grassTop + ry - cy;
            
            // 【定律三】：將跑道推移，讓肉眼可見的「跑道最左側外邊緣 (rx=798)」
            // 精準切齊在「畫面下緣的正中央 1/2 處 (也就是佔螢幕寬度 50% 處)」
            let targetX = vX + vW * 0.5;
            let targetY = vY + vH;
            
            let ty = minTy;
            let dy = targetY - (cy + ty);
            
            // 極端螢幕防呆機制：若橢圓 Y 軸跨度勾不到目標點，稍微釋放 Y 軸限制
            if (dy > ry) {
                ty = targetY - cy - ry;
                dy = ry;
            } else if (dy < -ry) {
                ty = targetY - cy + ry;
                dy = -ry;
            }
            
            // 透過橢圓方程式 (x-cx-tx)^2/rx^2 + (y-cy-ty)^2/ry^2 = 1，回推 X 軸完美的平移量 tx
            let ratioDy = dy / ry;
            ratioDy = Math.max(-1, Math.min(1, ratioDy)); // 確保在 -1 ~ 1 之間避免 NaN
            
            // 精準計算跑道整體該往右推多少，才能讓左側實體邊緣剛好落在 targetX 上
            let tx = targetX - cx + rx * Math.sqrt(1 - ratioDy * ratioDy);

            track.setAttribute('transform', `translate(${tx}, ${ty})`);

            // ==========================================
            // 3. 雲朵視覺微調
            // ==========================================
            const clouds = document.getElementById('animated-clouds');
            let cloudTy = vY * 0.5; // 讓雲朵隨著螢幕稍微上下跟隨
            clouds.setAttribute('transform', `translate(0, ${cloudTy})`);
        }

        // 監聽視窗大小改變事件，即時重新排版
        window.addEventListener('resize', autoAdjustScene);
        
        // 網頁載入時立刻執行一次初始化
        autoAdjustScene();
    </script>
</body>
</html>
